<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | CampusQuery</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Theme -->
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/index-animations.css" />
</head>

<body class="bg-darker text-white position-relative overflow-x-hidden">

<div class="dashboard-layout">
  
  <!-- Mobile Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar gs-sidebar" id="sidebar">
    <div class="sidebar-header d-flex align-items-center justify-content-between mb-0 border-0 pb-0">
      <h4 class="fw-bold mb-0 text-white d-flex align-items-center">
        <i class="bi bi-cpu text-info me-2"></i> CampusQuery
      </h4>
      <button id="close-sidebar" class="btn btn-link text-white d-lg-none p-0 border-0 bg-transparent shadow-none hover-white">
        <i class="bi bi-x-lg fs-5"></i>
      </button>
    </div>

    <ul class="sidebar-menu mt-4">
      <li>
        <a href="dashboard.html">
          <i class="bi bi-speedometer2 fs-5"></i>
          <span>Dashboard</span>
        </a>
      </li>

      <li>
        <a href="chat.html">
          <i class="bi bi-chat-dots fs-5"></i>
          <span>AI Chat</span>
        </a>
      </li>

      <!-- ADMIN ONLY -->
      <li id="admin-entry-link" class="d-none">
        <a href="entries.html">
          <i class="bi bi-journal-text fs-5"></i>
          <span>My Entries</span>
        </a>
      </li>

      <li>
        <a href="profile.html" class="active">
          <i class="bi bi-person fs-5"></i>
          <span>Profile</span>
        </a>
      </li>

      <li class="mt-auto pt-3 border-top border-secondary border-opacity-25">
        <a href="#" id="logout-btn" class="text-danger hover-white">
          <i class="bi bi-box-arrow-right fs-5"></i>
          <span>Logout</span>
        </a>
      </li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main-content w-100">
    
    <!-- Top bar -->
    <div class="topbar border-bottom border-secondary border-opacity-25 pb-3 mb-4 gs-dash-item d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center">
        <button id="toggle-sidebar" class="btn btn-dark border border-secondary border-opacity-50 btn-sm d-lg-none me-3 rounded p-2 text-white">
          <i class="bi bi-list fs-5 d-block"></i>
        </button>
        <h3 class="fw-bolder mb-0 text-white d-block">My Profile</h3>
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-area max-w-lg mt-5 d-flex justify-content-center">
        
       <!-- Profile Card -->
       <div class="glass-panel gs-profile-card shadow-lg rounded-4 p-5 text-center position-relative overflow-hidden w-100" style="max-width: 550px; border-top: 4px solid var(--info);">
           <!-- Decorative glow -->
           <div class="position-absolute top-0 start-50 translate-middle-x bg-info bg-opacity-25" style="width: 200px; height: 100px; filter: blur(40px); z-index: 0;"></div>

           <div class="position-relative z-1">
               <!-- Avatar Box -->
               <div class="bg-dark border border-secondary border-opacity-50 rounded-circle mx-auto d-flex align-items-center justify-content-center shadow-lg mb-4" 
                    style="width: 100px; height: 100px; border-width: 2px !important;">
                   <h1 class="display-5 text-info mb-0 fw-bold" id="profile-initial">?</h1>
               </div>
               
               <h2 class="fw-bold text-white mb-1 title-text text-truncate" id="profile-name">Loading...</h2>
               <p class="text-white-50 mb-3 text-truncate" id="profile-email">email@college.edu</p>
               
               <span class="badge bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25 px-3 py-2 rounded-pill fw-bold text-uppercase" id="profile-role">
                 Role
               </span>

               <hr class="border-secondary border-opacity-25 my-4">

               <div class="row text-start g-3 mb-5">
                   <div class="col-6">
                       <small class="text-muted d-block text-uppercase fw-bold mb-1" style="font-size: 0.70rem; letter-spacing: 0.05em;">Gender</small>
                       <div class="fw-semibold text-white" id="profile-gender">Not specified</div>
                   </div>
                   <div class="col-6">
                       <small class="text-muted d-block text-uppercase fw-bold mb-1" style="font-size: 0.70rem; letter-spacing: 0.05em;">Age</small>
                       <div class="fw-semibold text-white" id="profile-age">Not specified</div>
                   </div>
               </div>

               <button id="profile-logout-btn" class="btn btn-outline-danger w-100 rounded-pill py-2 fw-bold hover-white gs-profile-btn">
                  <i class="bi bi-power me-2"></i>Sign Out Completely
               </button>
           </div>
       </div>

    </div>

  </main>
</div>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Profile Logic -->
<script src="../js/pages/profile.js"></script>

</body>
</html>
