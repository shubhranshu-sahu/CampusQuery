<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Entries | CampusQuery</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Theme -->
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/index-animations.css" />
</head>

<body class="bg-darker text-white position-relative overflow-x-hidden">

<!-- GLOBAL LOADER -->
<div id="global-loader" class="loader-overlay d-none">
  <div class="loader-content text-center glass-panel p-4 rounded-4 shadow-lg border-info border-opacity-25">
    <div class="spinner-border text-info mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
    <p id="loader-text" class="fw-semibold text-white mb-0">Loading entries...</p>
  </div>
</div>

<div class="dashboard-layout">
  
  <!-- Mobile Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar gs-sidebar" id="sidebar">
    <div class="sidebar-header d-flex align-items-center justify-content-between mb-0 border-0 pb-0">
      <h4 class="fw-bold mb-0 text-white d-flex align-items-center">
        <i class="bi bi-cpu text-info me-2"></i> CampusQuery
      </h4>
      <button id="close-sidebar" class="btn btn-link text-white d-lg-none p-0 border-0 bg-transparent shadow-none hover-white">
        <i class="bi bi-x-lg fs-5"></i>
      </button>
    </div>

    <ul class="sidebar-menu mt-4">
      <li>
        <a href="dashboard.html">
          <i class="bi bi-speedometer2 fs-5"></i>
          <span>Dashboard</span>
        </a>
      </li>

      <li>
        <a href="chat.html">
          <i class="bi bi-chat-dots fs-5"></i>
          <span>AI Chat</span>
        </a>
      </li>

      <!-- ADMIN ONLY -->
      <li id="admin-entry-link">
        <a href="entries.html" class="active">
          <i class="bi bi-journal-text fs-5"></i>
          <span>My Entries</span>
        </a>
      </li>

      <li>
        <a href="profile.html">
          <i class="bi bi-person fs-5"></i>
          <span>Profile</span>
        </a>
      </li>

      <li class="mt-auto pt-3 border-top border-secondary border-opacity-25">
        <a href="#" id="logout-btn" class="text-danger hover-white">
          <i class="bi bi-box-arrow-right fs-5"></i>
          <span>Logout</span>
        </a>
      </li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main-content w-100">
    
    <!-- Top bar (mobile toggle & title) -->
    <div class="topbar border-bottom border-secondary border-opacity-25 pb-3 mb-4 gs-dash-item d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center">
        <button id="toggle-sidebar" class="btn btn-dark border border-secondary border-opacity-50 btn-sm d-lg-none me-3 rounded p-2 text-white">
          <i class="bi bi-list fs-5 d-block"></i>
        </button>
        <h3 class="fw-bolder mb-0 text-white d-none d-md-block">Knowledge Base</h3>
      </div>
      <div>
        <button class="btn btn-info rounded-pill px-4 py-2 hover-lift fw-bold text-dark" onclick="openCreateModal()">
          <i class="bi bi-plus-lg me-1"></i> New Entry
        </button>
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-area max-w-lg" style="max-width: 1400px;">
      <div class="mb-4 gs-dash-item">
        <h4 class="fw-bold text-white mb-1"><i class="bi bi-journals text-accent me-2"></i>My Entries</h4>
        <p class="text-muted">Manage the information blocks powering the AI's intelligence.</p>
      </div>

      <!-- Entries Container -->
      <div class="row g-4 pb-5" id="entries-container">
        <!-- Entries will be loaded here dynamically by entries.js -->
        <div class="col-12 text-center py-5">
           <div class="spinner-border text-info mb-3" role="status"></div>
           <p class="text-muted">Fetching knowledge base...</p>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- ===================== -->
<!-- ENTRY MODAL (CREATE/EDIT) -->
<!-- ===================== -->
<div class="modal fade" id="entryModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content glass-panel border-secondary border-opacity-50 blur-bg text-white shadow-lg overflow-hidden" 
         style="background-color: rgba(18, 24, 43, 0.95); backdrop-filter: blur(20px);">
      <div class="modal-header border-bottom border-secondary border-opacity-25 bg-white bg-opacity-10 py-3">
        <h5 class="modal-title fw-bold text-info" id="modalTitle"><i class="bi bi-pencil-square me-2"></i>New Entry</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <div class="mb-4">
          <label for="entry-title" class="form-label text-white-50 small fw-bold text-uppercase mb-2" style="letter-spacing: 0.05em;">Entry Title <span class="text-danger">*</span></label>
          <input type="text" id="entry-title" class="form-control bg-dark border-secondary border-opacity-50 text-white py-2 focus-ring-info" placeholder="E.g., Updated Hostel Guidelines 2026" />
        </div>
        <div class="mb-4">
          <label for="entry-description" class="form-label text-white-50 small fw-bold text-uppercase mb-2" style="letter-spacing: 0.05em;">Context / Description <span class="text-danger">*</span></label>
          <textarea id="entry-description" class="form-control bg-dark border-secondary border-opacity-50 text-white py-2 focus-ring-info" rows="6"
            placeholder="Provide the exact factual content you want the AI to learn..."></textarea>
        </div>
        <div class="mb-3">
          <label for="entry-tags" class="form-label text-white-50 small fw-bold text-uppercase mb-2" style="letter-spacing: 0.05em;">Tags (Comma Separated)</label>
          <input type="text" id="entry-tags" class="form-control bg-dark border-secondary border-opacity-50 text-white py-2 focus-ring-info" placeholder="hostel, rules, fees" />
        </div>
      </div>
      <div class="modal-footer border-top border-secondary border-opacity-25 bg-white bg-opacity-10 py-3">
        <button type="button" class="btn btn-outline-light rounded-pill px-4 hover-white" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-info rounded-pill px-4 fw-bold text-dark hover-lift shadow-sm" onclick="saveEntry()"><i class="bi bi-cloud-upload-fill me-2 border-end border-dark border-opacity-25 pe-2"></i> Save to Database</button>
      </div>
    </div>
  </div>
</div>

<!-- ===================== -->
<!-- VIEW ENTRY MODAL -->
<!-- ===================== -->
<div class="modal fade" id="viewEntryModal" tabindex="-1" aria-labelledby="viewModalTitle" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content glass-panel border-secondary border-opacity-50 blur-bg text-white shadow-lg overflow-hidden" 
         style="background-color: rgba(18, 24, 43, 0.95); backdrop-filter: blur(20px);">
      <div class="modal-header border-bottom border-secondary border-opacity-25 bg-white bg-opacity-10 py-3">
        <h5 class="modal-title fw-bold text-info" id="viewModalTitle">Entry Title</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-secondary border-opacity-25">
           <div class="bg-dark border border-secondary border-opacity-50 rounded-circle d-flex align-items-center justify-content-center p-3 me-3 text-info shadow-sm" style="width: 48px; height: 48px;">
               <i class="bi bi-person-fill fs-4"></i>
           </div>
           <div>
               <small class="text-white-50 d-block text-uppercase fw-bold" style="letter-spacing: 0.05em; font-size: 0.70rem;">Authored By</small>
               <span id="viewModalAuthor" class="fw-semibold text-white">Author Name</span>
           </div>
        </div>

        <div class="bg-dark bg-opacity-50 border border-secondary border-opacity-25 p-4 rounded-4 mb-4" style="max-height: 45vh; overflow-y: auto;">
          <p id="viewModalDescription" class="mb-0 text-white" style="white-space: pre-wrap; font-size: 1rem; line-height: 1.6;"></p>
        </div>

        <div>
           <small class="text-white-50 d-block text-uppercase fw-bold mb-2" style="letter-spacing: 0.05em; font-size: 0.70rem;">Linked Tags</small>
           <div id="viewModalTags">
               <!-- Badges injected via JS -->
           </div>
        </div>
      </div>
      <div class="modal-footer border-top border-secondary border-opacity-25 bg-white bg-opacity-10 py-3 d-flex flex-wrap justify-content-between">
        <div id="viewModalActions" class="d-flex flex-wrap gap-2 me-auto mb-2 mb-sm-0"></div>
        <button type="button" class="btn btn-outline-light rounded-pill px-4 hover-white ms-auto" data-bs-dismiss="modal">Close Window</button>
      </div>
    </div>
  </div>
</div>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Entries Logic -->
<script src="../js/config.js"></script>
<script src="../js/pages/entries.js"></script>

</body>
</html>
