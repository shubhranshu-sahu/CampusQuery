<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Entries | CampusQuery</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Theme -->
  <link rel="stylesheet" href="../css/theme.css" />
</head>

<body>

  <!-- ===================== -->
  <!-- DASHBOARD LAYOUT -->
  <!-- ===================== -->
  <div class="dashboard-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h5><i class="bi bi-cpu"></i> CampusQuery</h5>
      </div>

      <ul class="sidebar-menu">
        <li>
          <a href="dashboard.html">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
          </a>
        </li>

        <li>
          <a href="chat.html">
            <i class="bi bi-chat-dots"></i>
            <span>AI Chat</span>
          </a>
        </li>

        <!-- ADMIN ONLY -->
        <li id="admin-entry-link">
          <a href="entries.html" class="active">
            <i class="bi bi-journal-text"></i>
            <span>My Entries</span>
          </a>
        </li>

        <li>
          <a href="profile.html">
            <i class="bi bi-person"></i>
            <span>Profile</span>
          </a>
        </li>

        <li class="mt-auto">
          <a href="#" id="logout-btn" class="text-danger">
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
          </a>
        </li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top bar (mobile toggle) -->
      <div class="topbar d-lg-none">
        <button id="toggle-sidebar" class="btn btn-outline-light btn-sm">
          <i class="bi bi-list"></i>
        </button>
      </div>

      <!-- Content Area -->
      <div class="content-area">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="fw-bold m-0">My Entries</h2>
          <button class="btn btn-primary" onclick="openCreateModal()">
            <i class="bi bi-plus-lg"></i> New Entry
          </button>
        </div>

        <!-- Entries Container -->
        <div class="row g-4" id="entries-container">
          <!-- Entries will be loaded here dynamically by entries.js -->
          <p class="text-muted">Loading entries...</p>
        </div>
      </div>
    </main>

  </div>

  <!-- ===================== -->
  <!-- ENTRY MODAL -->
  <!-- ===================== -->
  <div class="modal fade" id="entryModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content"
        style="background-color: var(--bg-card); color: var(--text-main); border: 1px solid #2a324a;">
        <div class="modal-header" style="border-bottom: 1px solid #2a324a;">
          <h5 class="modal-title" id="modalTitle">New Entry</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="entry-title" class="form-label">Title</label>
            <input type="text" id="entry-title" class="form-control" placeholder="Enter title" />
          </div>
          <div class="mb-3">
            <label for="entry-description" class="form-label">Description</label>
            <textarea id="entry-description" class="form-control" rows="4"
              placeholder="Enter brief description..."></textarea>
          </div>
          <div class="mb-3">
            <label for="entry-tags" class="form-label">Tags</label>
            <input type="text" id="entry-tags" class="form-control" placeholder="e.g. tag1, tag2" />
          </div>
        </div>
        <div class="modal-footer" style="border-top: 1px solid #2a324a;">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="saveEntry()">Save Entry</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===================== -->
  <!-- VIEW ENTRY MODAL -->
  <!-- ===================== -->
  <div class="modal fade" id="viewEntryModal" tabindex="-1" aria-labelledby="viewModalTitle" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content"
        style="background-color: var(--bg-card); color: var(--text-main); border: 1px solid #2a324a;">
        <div class="modal-header" style="border-bottom: 1px solid #2a324a;">
          <h5 class="modal-title" id="viewModalTitle">Entry Title</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <small id="viewModalAuthor" class="text-secondary d-block mb-3">Author: </small>
          <p id="viewModalDescription" style="white-space: pre-wrap; font-size: 0.95rem;"></p>
          <hr style="border-color: #2a324a;">
          <small id="viewModalTags" class="text-info d-block">Tags: </small>
        </div>
        <div class="modal-footer" style="border-top: 1px solid #2a324a;">
          <div id="viewModalActions" class="me-auto gap-2 d-flex"></div>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS for mobile sidebar toggle if needed -->
  <script>
    const toggleBtn = document.getElementById('toggle-sidebar');
    const sidebar = document.getElementById('sidebar');
    if (toggleBtn && sidebar) {
      toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('show');
      });
    }
  </script>

  <!-- Entries Logic -->
   <script src="../js/config.js"></script>
  <script src="../js/pages/entries.js"></script>

</body>

</html>
