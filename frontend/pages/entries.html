<!DOCTYPE html>
<html lang="en">
<head>
  <title>Entries | CampusQuery</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
</head>

<body>

<div class="dashboard-layout">

  <!-- Sidebar (same as dashboard) -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h5><i class="bi bi-cpu"></i> CampusQuery</h5>
    </div>

    <ul class="sidebar-menu">
      <li>
        <a href="dashboard.html">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>
      </li>

      <li>
        <a href="chat.html">
          <i class="bi bi-chat-dots"></i>
          <span>AI Chat</span>
        </a>
      </li>

      <li>
        <a href="#" class="active">
          <i class="bi bi-journal-text"></i>
          <span>My Entries</span>
        </a>
      </li>

      <li>
        <a href="profile.html">
          <i class="bi bi-person"></i>
          <span>Profile</span>
        </a>
      </li>

      <li class="mt-auto">
        <a href="#" id="logout-btn" class="text-danger">
          <i class="bi bi-box-arrow-right"></i>
          <span>Logout</span>
        </a>
      </li>
    </ul>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="content-area">

      <div class="d-flex justify-content-between mb-3">
        <h3>Knowledge Entries</h3>
        <button class="btn btn-success" onclick="openCreateModal()">
          <i class="bi bi-plus"></i> New Entry
        </button>
      </div>

      <div id="entries-container" class="row g-3"></div>

    </div>
  </main>

</div>

<!-- MODAL -->
<div class="modal fade" id="entryModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 id="modalTitle">Entry</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input id="entry-title" class="form-control mb-2" placeholder="Title">
        <textarea id="entry-description" class="form-control mb-2" rows="4"></textarea>
        <input id="entry-tags" class="form-control" placeholder="tags (comma separated)">
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveEntry()">Save</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/pages/entries.js"></script>

</body>
</html>
