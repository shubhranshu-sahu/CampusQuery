<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat | CampusQuery</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/index-animations.css">
  <link rel="stylesheet" href="../css/chat.css">
</head>

<body class="bg-darker text-white position-relative overflow-x-hidden">

<!-- GLOBAL LOADER -->
<div id="global-loader" class="loader-overlay d-none">
  <div class="loader-content text-center glass-panel p-4 rounded-4 shadow-lg border-info border-opacity-25">
    <div class="spinner-border text-info mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
    <p id="loader-text" class="fw-semibold text-white mb-0">Loading...</p>
  </div>
</div>

<div class="dashboard-layout chat-layout">

  <!-- Mobile Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar gs-sidebar" id="sidebar">
    <div class="sidebar-header d-flex align-items-center justify-content-between mb-0 border-0 pb-0">
      <h4 class="fw-bold mb-0 text-white d-flex align-items-center">
        <i class="bi bi-cpu text-info me-2"></i> CampusQuery
      </h4>
      <button id="close-sidebar" class="btn btn-link text-white d-lg-none p-0 border-0 bg-transparent shadow-none hover-white">
        <i class="bi bi-x-lg fs-5"></i>
      </button>
    </div>

    <div class="mt-4 mb-3 d-flex gap-2 gs-sidebar-item">
        <button onclick="goBack()" class="btn btn-outline-secondary w-100 rounded-pill hover-white fw-bold">
            <i class="bi bi-arrow-left"></i> Back
        </button>
        <button id="new-chat-btn" class="btn btn-info w-100 rounded-pill fw-bold text-dark hover-lift">
            <i class="bi bi-plus-lg"></i> New
        </button>
    </div>

    <!-- Threads container -->
    <div id="thread-list" class="thread-list mt-2 gs-sidebar-item flex-grow-1 overflow-y-auto w-100 pe-1"></div>
    
  </aside>

  <!-- Main Panel -->
  <main class="main-content w-100 d-flex flex-column" style="height: 100vh; overflow: hidden; padding: 0;">

    <!-- Top bar for Mobile Toggle -->
    <div class="d-lg-none p-3 border-bottom border-secondary border-opacity-25 bg-darker z-2 shadow-sm d-flex align-items-center justify-content-between">
      <button id="toggle-sidebar" class="btn btn-dark border border-secondary border-opacity-50 btn-sm rounded p-2 text-white">
        <i class="bi bi-list fs-5 d-block"></i>
      </button>
      <div class="fw-bold text-white"><i class="bi bi-chat-dots text-info me-1"></i> AI Chat</div>
      <div style="width: 38px;"></div> <!-- Spacer -->
    </div>

    <!-- Welcome Screen -->
    <div id="welcome-screen" class="welcome-screen flex-grow-1 d-flex flex-column align-items-center justify-content-center p-4">
      <div class="glass-panel p-5 rounded-4 border-info border-opacity-25 border-top border-4 text-center gs-welcome-card" style="max-width: 500px;">
        <div class="bg-info bg-opacity-10 text-info p-3 rounded-circle d-inline-block mb-4 shadow-sm">
           <i class="bi bi-stars" style="font-size: 2.5rem;"></i>
        </div>
        <h3 class="fw-bold text-white mb-3">Welcome to Campus AI</h3>
        <p class="text-muted mb-4">Select a previous chat from the sidebar or start a new thread to get instant, accurate campus intelligence.</p>
        <button onclick="document.getElementById('new-chat-btn').click()" class="btn btn-info rounded-pill px-4 py-2 hover-lift fw-bold">
          Start a Conversation
        </button>
      </div>
    </div>

    <!-- Chat Container -->
    <div id="chat-container" class="d-none flex-grow-1 flex-column position-relative h-100 p-3 pt-0 p-md-4 pt-md-4 pb-0">

      <!-- Header -->
      <div class="chat-header glass-panel px-4 py-3 rounded-4 mb-3 d-flex justify-content-between align-items-center border-bottom border-secondary border-opacity-25 gs-chat-item">
        <h5 id="current-thread-name" class="fw-bold text-white mb-0 text-truncate me-3"></h5>

        <div class="d-flex gap-2 flex-shrink-0">
          <button id="rename-thread" class="btn btn-sm btn-outline-secondary hover-white rounded-pill px-3" title="Rename Thread">
            <i class="bi bi-pencil"></i> <span class="d-none d-sm-inline ms-1">Rename</span>
          </button>
          <button id="delete-thread" class="btn btn-sm btn-outline-danger hover-white rounded-pill px-3" title="Delete Thread">
            <i class="bi bi-trash"></i> <span class="d-none d-sm-inline ms-1">Delete</span>
          </button>
        </div>
      </div>

      <!-- Messages Area -->
      <div id="chat-messages" class="chat-messages flex-grow-1 overflow-y-auto px-2 px-md-3 gs-chat-item pb-3" style="scroll-behavior: auto;"></div>

      <!-- Input Area -->
      <div class="chat-input-container mt-auto pt-3 pb-3 pb-md-0 gs-chat-item bg-darker" style="position: sticky; bottom: 0;">
        
        <div id="typing-indicator" class="typing-indicator d-none mb-2 ms-3">
          <div class="d-flex align-items-center text-info small fw-bold">
            <span class="spinner-grow spinner-grow-sm me-2" role="status" aria-hidden="true"></span>
            CampusQuery is analyzing...
          </div>
        </div>

        <form id="chat-form" class="m-0">
          <div class="input-group glass-panel rounded-pill p-1 border-secondary border-opacity-50 focus-ring-info shadow-lg p-2">
            <input
              type="text"
              id="chat-input"
              class="form-control bg-transparent border-0 text-white shadow-none px-4 py-2"
              placeholder="Ask me anything about campus policies..."
              autocomplete="off"
            >
            <button class="btn btn-info rounded-pill px-4 text-dark fw-bold hover-lift" type="submit">
              <i class="bi bi-send-fill fs-5 mt-1 d-inline-block"></i>
            </button>
          </div>
        </form>
      </div>

    </div>

  </main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script src="../js/config.js"></script>
<script src="../js/pages/chat.js"></script>
</body>
</html>
