<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | CampusQuery</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <!-- Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/index-animations.css" />
</head>

<body class="auth-page position-relative overflow-x-hidden min-vh-100">

<!-- Abstract Background Objects -->
<div class="glow-orb orb-1 opacity-25"></div>
<div class="glow-orb orb-2 opacity-25"></div>
<div class="glow-orb orb-3 opacity-25"></div>

<!-- GLOBAL LOADER -->
<div id="global-loader" class="loader-overlay d-none">
  <div class="loader-content text-center glass-panel p-4 rounded-4 shadow-lg border-primary border-opacity-25">
    <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
    <p id="loader-text" class="fw-semibold text-white mb-0">Provisioning account...</p>
  </div>
</div>

<!-- REGISTER CONTAINER -->
<div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center position-relative z-1 py-5">
  <div class="auth-card auth-card-wide glass-panel w-100 p-4 p-md-5 my-auto rounded-4 border border-secondary border-opacity-25 shadow-lg gs-auth-card">

    <!-- Header -->
    <div class="text-center mb-4 gs-auth-item">
      <a href="../index.html" class="text-decoration-none d-inline-block hover-lift">
        <h3 class="fw-bold text-white mb-1">
          <i class="bi bi-cpu text-primary"></i> CampusQuery
        </h3>
      </a>
      <p class="text-muted mt-2">Create your institutional profile</p>
    </div>

    <!-- Error Box -->
    <div id="error-box" class="alert alert-danger d-none border-danger border-opacity-50 bg-danger bg-opacity-10 text-white shadow-sm gs-auth-item"></div>

    <!-- Register Form -->
    <form id="register-form">

      <div class="row gs-auth-item">
        <div class="col-md-6 mb-3">
          <label class="form-label text-white-50 small fw-bold text-uppercase mb-2" style="letter-spacing: 0.05em;">First Name</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary border-opacity-50 text-muted"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control bg-dark border-secondary border-opacity-50 text-white" id="first_name" required placeholder="John" />
          </div>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label text-white-50 small fw-bold text-uppercase mb-2" style="letter-spacing: 0.05em;">Last Name</label>
           <div class="input-group">
             <input type="text" class="form-control bg-dark border-secondary border-opacity-50 text-white rounded-start" id="last_name" required placeholder="Doe" />
           </div>
        </div>
      </div>

      <div class="mb-3 gs-auth-item">
        <label class="form-label text-white-50 small fw-bold text-uppercase mb-2" style="letter-spacing: 0.05em;">Institutional Email</label>
        <div class="input-group">
          <span class="input-group-text bg-dark border-secondary border-opacity-50 text-muted"><i class="bi bi-envelope"></i></span>
          <input
            type="email"
            class="form-control bg-dark border-secondary border-opacity-50 text-white"
            id="email"
            placeholder="you@college.edu"
            required
          />
        </div>
      </div>

      <div class="row gs-auth-item">
        <div class="col-md-6 mb-3">
          <label class="form-label text-white-50 small fw-bold text-uppercase mb-2" style="letter-spacing: 0.05em;">Password</label>
          <div class="input-group">
             <span class="input-group-text bg-dark border-secondary border-opacity-50 text-muted"><i class="bi bi-lock"></i></span>
            <input
              type="password"
              class="form-control bg-dark border-secondary border-opacity-50 text-white"
              id="password"
              placeholder="Min 6 characters"
              required
            />
          </div>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label text-white-50 small fw-bold text-uppercase mb-2" style="letter-spacing: 0.05em;">Confirm Password</label>
          <div class="input-group">
             <span class="input-group-text bg-dark border-secondary border-opacity-50 text-muted"><i class="bi bi-check2-circle"></i></span>
            <input
              type="password"
              class="form-control bg-dark border-secondary border-opacity-50 text-white"
              id="confirm_password"
              placeholder="Repeat password"
              required
            />
          </div>
        </div>
      </div>

      <div class="row gs-auth-item">
        <div class="col-md-6 mb-3">
          <label class="form-label text-white-50 small fw-bold text-uppercase mb-2" style="letter-spacing: 0.05em;">Gender</label>
          <div class="input-group">
             <span class="input-group-text bg-dark border-secondary border-opacity-50 text-muted"><i class="bi bi-gender-ambiguous"></i></span>
            <select class="form-select bg-dark border-secondary border-opacity-50 text-white" id="gender" required>
              <option value="" disabled selected class="text-muted">Select</option>
              <option value="Male" class="text-white">Male</option>
              <option value="Female" class="text-white">Female</option>
              <option value="Other" class="text-white">Other</option>
              <option value="Prefer not to say" class="text-white">Prefer not to say</option>
            </select>
          </div>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label text-white-50 small fw-bold text-uppercase mb-2" style="letter-spacing: 0.05em;">Age</label>
           <div class="input-group">
             <span class="input-group-text bg-dark border-secondary border-opacity-50 text-muted"><i class="bi bi-calendar-event"></i></span>
            <input
              type="number"
              class="form-control bg-dark border-secondary border-opacity-50 text-white"
              id="age"
              min="16"
              max="100"
              placeholder="e.g. 20"
              required
            />
          </div>
        </div>
      </div>

      <div class="mb-4 gs-auth-item">
        <label class="form-label text-white-50 small fw-bold text-uppercase mb-2" style="letter-spacing: 0.05em;">Role Access</label>
        <div class="input-group">
           <span class="input-group-text bg-dark border-secondary border-opacity-50 text-muted"><i class="bi bi-shield-lock"></i></span>
          <select class="form-select bg-dark border-secondary border-opacity-50 text-white" id="role" required>
            <option value="" disabled selected class="text-muted">Select role</option>
            <option value="student" class="text-white">Student</option>
            <option value="admin" class="text-white">Administrator</option>
          </select>
        </div>
        <small class="text-muted mt-2 d-block">
          <i class="bi bi-info-circle me-1"></i> Admin access requires institutional approval.
        </small>
      </div>

      <div class="gs-auth-item mt-5">
        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm hover-lift text-white">
          Complete Registration <i class="bi bi-check-circle fs-5 align-middle mb-1 ms-1 pt-1"></i>
        </button>
      </div>
    </form>

    <!-- Footer -->
    <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25 gs-auth-item">
      <small class="text-muted">
        Already have an account?
        <a href="login.html" class="text-info text-decoration-none fw-semibold hover-white" style="transition: color 0.2s;">
          Sign In
        </a>
      </small>
    </div>

  </div>
</div>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Register Logic -->
<script src="../js/config.js"></script>
<script src="../js/pages/register.js"></script>

<!-- Inline Intro Animations -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    if (typeof gsap === 'undefined') return;
    
    const tl = gsap.timeline({ defaults: { ease: "power3.out" } });
    
    tl.from(".gs-auth-card", {
      y: 40,
      scale: 0.95,
      opacity: 0,
      duration: 1
    })
    .from(".gs-auth-item", {
      y: 20,
      opacity: 0,
      duration: 0.8,
      stagger: 0.08
    }, "-=0.6");
  });
</script>

</body>
</html>
